<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Stock Validation PRO</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
  font-family:Arial;
  background:#f3f5f7;
  padding:40px;
}

.container{
  max-width:1000px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:12px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

label{
  font-weight:bold;
  display:block;
  margin-top:15px;
}

input,
select,
button{

  width:100%;
  padding:12px;
  margin-top:8px;
  box-sizing:border-box;
}

button{
  background:#4285F4;
  color:white;
  border:none;
  cursor:pointer;
  margin-top:25px;
}

.progress{
  width:100%;
  background:#ddd;
  height:25px;
  border-radius:5px;
  overflow:hidden;
  margin-top:20px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#4285F4;
}

.logs{
  margin-top:20px;
  background:#f8f8f8;
  padding:15px;
  height:220px;
  overflow:auto;
  border:1px solid #ddd;
}

</style>

</head>

<body>

<div class="container">

<h2>🚀 STOCK VALIDATION PRO</h2>

<div class="grid">

<div>

<label>Region</label>

<select id="region">

<option>SG</option>
<option>MY</option>
<option>PH</option>

</select>

</div>

<div>

<label>Tracker Sheet</label>

<select id="trackerSheet"></select>

</div>

</div>

<hr>

<div class="grid">

<div>

<label>Sales Report ZIP/XLSX</label>

<input
type="file"
id="sales"
accept=".zip,.xlsx"
multiple>

</div>

<div>

<label>Basic Info CSV/XLSX</label>

<input
type="file"
id="basicInfo"
accept=".csv,.xlsx">

</div>

<div>

<label>Inventory CSV</label>

<input
type="file"
id="inventory"
accept=".csv">

</div>

<div>

<label>Product Master CSV</label>

<input
type="file"
id="productMaster"
accept=".csv">

</div>

<div>

<label>Content CSV/XLSX</label>

<input
type="file"
id="content"
accept=".csv,.xlsx">

</div>

<div>

<label>Tracker CSV/XLSX</label>

<input
type="file"
id="tracker"
accept=".csv,.xlsx">

</div>

</div>

<hr>

<div class="grid">

<div>

<label>Ecom Column</label>

<select id="ecomColumn"></select>

</div>

<div>

<label>Launch Date Column</label>

<select id="launchColumn"></select>

</div>

</div>

<button onclick="runValidation()">

RUN VALIDATION

</button>

<div class="progress">

<div
class="progress-bar"
id="progressBar">
</div>

</div>

<div
class="logs"
id="logs">

Waiting...

</div>

</div>

<script>

const API_URL =
"https://script.google.com/a/macros/graas.ai/s/AKfycbx6N9dCiql07GI8HT6yPLIXL1JF0KOH6ljgKmPIAM9w5STqvxK7G0BJyNXmstpPoaqQuA/exec";

let trackerWorkbook = null;

// ====================================
// LOG
// ====================================

function log(message){

  const logs =
    document.getElementById("logs");

  logs.innerHTML +=
    "<br>✔ " + message;

  logs.scrollTop =
    logs.scrollHeight;
}

// ====================================
// PROGRESS
// ====================================

function setProgress(value){

  document
    .getElementById("progressBar")
    .style.width =
    value + "%";
}

// ====================================
// READ CSV
// ====================================

function readCSV(file){

  return new Promise((resolve)=>{

    const reader =
      new FileReader();

    reader.onload =
      e => resolve(e.target.result);

    reader.readAsText(file);

  });
}

// ====================================
// READ XLSX
// ====================================

function readExcel(file,sheetIndex=0){

  return new Promise((resolve)=>{

    const reader =
      new FileReader();

    reader.onload =
    function(e){

      const data =
        new Uint8Array(
          e.target.result
        );

      const workbook =
        XLSX.read(data,{
          type:"array"
        });

      const sheet =
        workbook.Sheets[
          workbook.SheetNames[
            sheetIndex
          ]
        ];

      const csv =
        XLSX.utils.sheet_to_csv(
          sheet
        );

      resolve({
        csv,
        workbook
      });

    };

    reader.readAsArrayBuffer(file);

  });
}

// ====================================
// CLEAN SALES REPORT
// REMOVE TOP 2 + BOTTOM 3
// ====================================

function cleanSalesCsv(csv){

  const rows =
    csv.split("\n");

  const cleaned =
    rows.slice(
      2,
      rows.length - 3
    );

  return cleaned.join("\n");
}

// ====================================
// READ ZIP SALES FILES
// ====================================

async function readZipSales(file){

  const zip =
    await JSZip.loadAsync(file);

  let finalCsv = "";

  const files =
    Object.keys(zip.files);

  for(const filename of files){

    if(
      filename.endsWith(".xlsx")
    ){

      const blob =
        await zip.files[
          filename
        ].async("blob");

      const excel =
        await readExcel(blob);

      const cleaned =
        cleanSalesCsv(
          excel.csv
        );

      finalCsv +=
        cleaned + "\n";

    }

  }

  return finalCsv;
}

// ====================================
// TRACKER LOAD
// ====================================

document
.getElementById("tracker")
.addEventListener(
"change",
async function(event){

  const file =
    event.target.files[0];

  if(
    file.name
    .toLowerCase()
    .endsWith(".xlsx")
  ){

    const excel =
      await readExcel(file);

    trackerWorkbook =
      excel.workbook;

    const dropdown =
      document.getElementById(
        "trackerSheet"
      );

    dropdown.innerHTML = "";

    trackerWorkbook.SheetNames
    .forEach(function(sheet){

      const option =
        document.createElement(
          "option"
        );

      option.value = sheet;
      option.text = sheet;

      dropdown.appendChild(option);

    });

    loadTrackerHeaders();

  }

});

// ====================================
// TRACKER SHEET CHANGE
// ====================================

document
.getElementById("trackerSheet")
.addEventListener(
"change",
function(){

  loadTrackerHeaders();

});

// ====================================
// LOAD TRACKER HEADERS
// ====================================

function loadTrackerHeaders(){

  const sheetName =
    document.getElementById(
      "trackerSheet"
    ).value;

  const sheet =
    trackerWorkbook.Sheets[
      sheetName
    ];

  const csv =
    XLSX.utils.sheet_to_csv(
      sheet
    );

  const headers =
    csv
    .split("\n")[0]
    .split(",");

  const ecom =
    document.getElementById(
      "ecomColumn"
    );

  const launch =
    document.getElementById(
      "launchColumn"
    );

  ecom.innerHTML = "";
  launch.innerHTML = "";

  headers.forEach(function(h,i){

    const o1 =
      document.createElement(
        "option"
      );

    o1.value = i;
    o1.text = h;

    ecom.appendChild(o1);

    const o2 =
      document.createElement(
        "option"
      );

    o2.value = i;
    o2.text = h;

    launch.appendChild(o2);

  });

}

// ====================================
// RUN
// ====================================

async function runValidation(){

  try{

    setProgress(10);

    log("Reading Sales Report");

    const salesFiles =
      document.getElementById(
        "sales"
      ).files;

    let sales = "";

    for(const file of salesFiles){

      if(
        file.name.endsWith(".zip")
      ){

        sales +=
          await readZipSales(file);

      }else{

        const excel =
          await readExcel(file);

        sales +=
          cleanSalesCsv(
            excel.csv
          );
      }
    }

    setProgress(25);

    log("Reading Basic Info");

    const basicFile =
      document.getElementById(
        "basicInfo"
      ).files[0];

    let basicInfo = "";

    if(
      basicFile.name.endsWith(".xlsx")
    ){

      basicInfo =
        (
          await readExcel(
            basicFile
          )
        ).csv;

    }else{

      basicInfo =
        await readCSV(
          basicFile
        );
    }

    setProgress(40);

    log("Reading Inventory");

    const inventory =
      await readCSV(
        document.getElementById(
          "inventory"
        ).files[0]
      );

    setProgress(50);

    log("Reading Product Master");

    const productMaster =
      await readCSV(
        document.getElementById(
          "productMaster"
        ).files[0]
      );

    setProgress(60);

    log("Reading Content");

    const contentFile =
      document.getElementById(
        "content"
      ).files[0];

    let content = "";

    if(
      contentFile.name.endsWith(".xlsx")
    ){

      content =
        (
          await readExcel(
            contentFile
          )
        ).csv;

    }else{

      content =
        await readCSV(
          contentFile
        );
    }

    setProgress(70);

    log("Reading Tracker");

    const sheetName =
      document.getElementById(
        "trackerSheet"
      ).value;

    const trackerSheet =
      trackerWorkbook.Sheets[
        sheetName
      ];

    const tracker =
      XLSX.utils.sheet_to_csv(
        trackerSheet
      );

    setProgress(80);

    log("Sending To API");

    const response =
      await fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

          sales,
          basicInfo,
          inventory,
          productMaster,
          content,
          tracker,

          region:
            document.getElementById(
              "region"
            ).value,

          ecomColumn:
            Number(
              document.getElementById(
                "ecomColumn"
              ).value
            ),

          launchColumn:
            Number(
              document.getElementById(
                "launchColumn"
              ).value
            )

        })

      });

    setProgress(95);

    const csv =
      await response.text();

    const blob =
      new Blob([csv],{
        type:"text/csv"
      });

    const url =
      window.URL.createObjectURL(
        blob
      );

    const a =
      document.createElement("a");

    a.href = url;

    a.download =
      "Stock_Validation_Output.csv";

    a.click();

    setProgress(100);

    log("Validation Completed");

  }catch(error){

    console.error(error);

    alert(error.message);

    log(error.message);
  }

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<title>Stock Validation PRO</title>

<style>

body {

  font-family: Arial;
  background: #f3f5f7;
  padding: 40px;
}

.container {

  max-width: 750px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
}

input,
select,
button {

  width: 100%;
  padding: 12px;
  margin-top: 10px;
  margin-bottom: 20px;
  box-sizing: border-box;
}

button {

  background: #4285F4;
  color: white;
  border: none;
  cursor: pointer;
  font-size: 16px;
}

button:hover {

  background: #3367D6;
}

.progress {

  width: 100%;
  background: #ddd;
  height: 25px;
  border-radius: 5px;
  overflow: hidden;
}

.progress-bar {

  height: 100%;
  width: 0%;
  background: #4285F4;
  transition: width 0.3s;
}

.logs {

  background: #f8f8f8;
  padding: 15px;
  height: 180px;
  overflow: auto;
  font-size: 13px;
  border: 1px solid #ddd;
}

hr {

  margin-top: 30px;
  margin-bottom: 30px;
}

</style>

</head>

<body>

<div class="container">

<h2>🚀 STOCK VALIDATION PRO</h2>

<label>Region</label>

<select id="region">

<option>SG</option>
<option>MY</option>
<option>PH</option>

</select>

<hr>

<label>Sales CSV</label>
<input type="file" id="sales">

<label>Inventory CSV</label>
<input type="file" id="inventory">

<label>Tracker CSV</label>
<input type="file" id="tracker">

<label>Content CSV</label>
<input type="file" id="content">

<hr>

<label>Ecom Column</label>

<select id="ecomColumn">
</select>

<label>Launch Date Column</label>

<select id="launchColumn">
</select>

<button onclick="runValidation()">
RUN VALIDATION
</button>

<h3>Progress</h3>

<div class="progress">

<div
class="progress-bar"
id="progressBar">
</div>

</div>

<br>

<div
class="logs"
id="logs">

Waiting...

</div>

</div>

<script>

const API_URL =
"https://script.google.com/a/macros/graas.ai/s/AKfycbx6N9dCiql07GI8HT6yPLIXL1JF0KOH6ljgKmPIAM9w5STqvxK7G0BJyNXmstpPoaqQuA/exec";

function log(message) {

  const logs =
    document.getElementById("logs");

  logs.innerHTML +=
    "<br>✔ " + message;

  logs.scrollTop =
    logs.scrollHeight;
}

function setProgress(value) {

  document
    .getElementById("progressBar")
    .style.width =
    value + "%";
}

function readFile(file) {

  return new Promise((resolve) => {

    const reader =
      new FileReader();

    reader.onload =
      (e) => {

        resolve(
          e.target.result
        );
      };

    reader.readAsText(file);

  });
}

// =====================================
// DYNAMIC TRACKER COLUMNS
// =====================================

document
  .getElementById("tracker")
  .addEventListener(
    "change",
    async function(event) {

      log("Reading Tracker Headers");

      const file =
        event.target.files[0];

      const text =
        await readFile(file);

      const firstLine =
        text.split("\n")[0];

      const headers =
        firstLine
          .replace(/\r/g, "")
          .split(",");

      const ecomDropdown =
        document.getElementById("ecomColumn");

      const launchDropdown =
        document.getElementById("launchColumn");

      ecomDropdown.innerHTML = "";

      launchDropdown.innerHTML = "";

      headers.forEach(function(header, index) {

        const option1 =
          document.createElement("option");

        option1.value =
          index;

        option1.text =
          header;

        ecomDropdown.appendChild(option1);

        const option2 =
          document.createElement("option");

        option2.value =
          index;

        option2.text =
          header;

        launchDropdown.appendChild(option2);

      });

      log("Tracker Columns Loaded");
    }
  );

// =====================================
// RUN VALIDATION
// =====================================

async function runValidation() {

  const salesFile =
    document.getElementById("sales").files[0];

  const inventoryFile =
    document.getElementById("inventory").files[0];

  const trackerFile =
    document.getElementById("tracker").files[0];

  const contentFile =
    document.getElementById("content").files[0];

  if (
    !salesFile ||
    !inventoryFile ||
    !trackerFile ||
    !contentFile
  ) {

    alert(
      "Please Upload All Files"
    );

    return;
  }

  try {

    setProgress(10);

    log("Reading Sales File");

    const sales =
      await readFile(
        salesFile
      );

    setProgress(20);

    log("Reading Inventory File");

    const inventory =
      await readFile(
        inventoryFile
      );

    setProgress(30);

    log("Reading Tracker File");

    const tracker =
      await readFile(
        trackerFile
      );

    setProgress(40);

    log("Reading Content File");

    const content =
      await readFile(
        contentFile
      );

    const region =
      document.getElementById("region").value;

    const ecomColumn =
      Number(
        document.getElementById("ecomColumn").value
      );

    const launchColumn =
      Number(
        document.getElementById("launchColumn").value
      );

    setProgress(50);

    log("Sending Data To API");

    const response =
      await fetch(
        API_URL,
        {

          method: "POST",

          body:
            JSON.stringify({

              sales,
              inventory,
              tracker,
              content,
              region,
              ecomColumn,
              launchColumn

            })
        }
      );

    setProgress(80);

    log("Generating Output");

    const csv =
      await response.text();

    const blob =
      new Blob(
        [csv],
        {
          type: "text/csv"
        }
      );

    const url =
      window.URL.createObjectURL(blob);

    const a =
      document.createElement("a");

    a.href = url;

    a.download =
      "validation_output.csv";

    document.body.appendChild(a);

    a.click();

    a.remove();

    setProgress(100);

    log("Validation Completed");

  } catch(error) {

    console.error(error);

    alert(
      "Validation Failed"
    );

    log(
      "Error: " +
      error.message
    );
  }
}

</script>

</body>
</html>

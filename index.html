<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Stock Validation PRO</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
  font-family:Arial;
  background:#f3f5f7;
  padding:40px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:12px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

input,
select,
button{
  width:100%;
  padding:12px;
  margin-top:10px;
}

button{
  background:#4285F4;
  color:white;
  border:none;
  cursor:pointer;
}

.logs{
  margin-top:20px;
  background:#f8f8f8;
  height:220px;
  overflow:auto;
  padding:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>🚀 STOCK VALIDATION PRO</h2>

<div class="grid">

<div>
<label>Sales ZIP/XLSX</label>
<input type="file" id="sales">
</div>

<div>
<label>Basic Info</label>
<input type="file" id="basicInfo">
</div>

<div>
<label>Inventory CSV</label>
<input type="file" id="inventory">
</div>

<div>
<label>Product Master CSV</label>
<input type="file" id="productMaster">
</div>

<div>
<label>Tracker</label>
<input type="file" id="tracker">
</div>

<div>
<label>Content</label>
<input type="file" id="content">
</div>

</div>

<button onclick="runValidation()">

RUN VALIDATION

</button>

<div class="logs" id="logs">

Waiting...

</div>

</div>

<script>

const API_URL =
"https://script.google.com/a/macros/graas.ai/s/AKfycbx6N9dCiql07GI8HT6yPLIXL1JF0KOH6ljgKmPIAM9w5STqvxK7G0BJyNXmstpPoaqQuA/exec";

// ======================================
// LOG
// ======================================

function log(msg){

  const logs =
    document.getElementById(
      "logs"
    );

  logs.innerHTML +=
    "<br>✔ " + msg;
}

// ======================================
// BASE64
// ======================================

function fileToBase64(file){

  return new Promise((resolve)=>{

    const reader =
      new FileReader();

    reader.onload =
      ()=>resolve(
        reader.result
      );

    reader.readAsDataURL(file);

  });

}

// ======================================
// RUN
// ======================================

async function runValidation(){

  try{

    log("Reading Files");

    const sales =
      document.getElementById(
        "sales"
      ).files[0];

    const basicInfo =
      document.getElementById(
        "basicInfo"
      ).files[0];

    const inventory =
      document.getElementById(
        "inventory"
      ).files[0];

    const productMaster =
      document.getElementById(
        "productMaster"
      ).files[0];

    const tracker =
      document.getElementById(
        "tracker"
      ).files[0];

    const content =
      document.getElementById(
        "content"
      ).files[0];

    log("Converting Files");

    const payload = {

      files:{

        sales:
          await fileToBase64(
            sales
          ),

        basicInfo:
          await fileToBase64(
            basicInfo
          ),

        inventory:
          await fileToBase64(
            inventory
          ),

        productMaster:
          await fileToBase64(
            productMaster
          ),

        tracker:
          await fileToBase64(
            tracker
          ),

        content:
          await fileToBase64(
            content
          )

      },

      config:{

        ecomColumn:2,
        launchColumn:3

      }

    };

    log("Sending To API");

    const response =
      await fetch(API_URL,{

        method:"POST",

        body:JSON.stringify(
          payload
        )

      });

    const csv =
      await response.text();

    const blob =
      new Blob([csv],{
        type:"text/csv"
      });

    const url =
      window.URL.createObjectURL(
        blob
      );

    const a =
      document.createElement("a");

    a.href = url;

    a.download =
      "Stock_Validation_Output.csv";

    a.click();

    log("Completed");

  }catch(error){

    console.error(error);

    alert(error.message);

  }

}

</script>

</body>
</html>

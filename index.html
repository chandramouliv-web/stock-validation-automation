<!DOCTYPE html>
<html>

<head>

<title>Stock Validation PRO</title>

<meta charset="UTF-8">

<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

<style>

body {

  font-family: Arial;
  background: #f3f5f7;
  padding: 40px;
}

.container {

  max-width: 800px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {

  margin-bottom: 30px;
}

label {

  font-weight: bold;
}

input,
select,
button {

  width: 100%;
  padding: 12px;
  margin-top: 10px;
  margin-bottom: 20px;
  box-sizing: border-box;
  font-size: 14px;
}

button {

  background: #4285F4;
  color: white;
  border: none;
  cursor: pointer;
  font-size: 16px;
}

button:hover {

  background: #3367D6;
}

.progress {

  width: 100%;
  background: #ddd;
  height: 25px;
  border-radius: 5px;
  overflow: hidden;
}

.progress-bar {

  height: 100%;
  width: 0%;
  background: #4285F4;
  transition: width 0.3s;
}

.logs {

  background: #f8f8f8;
  padding: 15px;
  height: 180px;
  overflow: auto;
  font-size: 13px;
  border: 1px solid #ddd;
  border-radius: 5px;
}

hr {

  margin-top: 30px;
  margin-bottom: 30px;
}

</style>

</head>

<body>

<div class="container">

<h2>🚀 STOCK VALIDATION PRO</h2>

<label>Region</label>

<select id="region">

<option>SG</option>
<option>MY</option>
<option>PH</option>

</select>

<hr>

<label>Sales CSV</label>
<input type="file" id="sales" accept=".csv">

<label>Inventory CSV</label>
<input type="file" id="inventory" accept=".csv">

<label>Tracker XLSX / CSV</label>
<input type="file" id="tracker" accept=".xlsx,.csv">

<label>Content CSV</label>
<input type="file" id="content" accept=".csv">

<hr>

<label>Ecom Column</label>

<select id="ecomColumn">
</select>

<label>Launch Date Column</label>

<select id="launchColumn">
</select>

<button onclick="runValidation()">
RUN VALIDATION
</button>

<h3>Progress</h3>

<div class="progress">

<div
class="progress-bar"
id="progressBar">
</div>

</div>

<br>

<div
class="logs"
id="logs">

Waiting...

</div>

</div>

<script>

// =====================================
// REPLACE THIS URL
// =====================================

const API_URL =
"https://script.google.com/a/macros/graas.ai/s/AKfycbx6N9dCiql07GI8HT6yPLIXL1JF0KOH6ljgKmPIAM9w5STqvxK7G0BJyNXmstpPoaqQuA/exec";

// =====================================
// LOG FUNCTION
// =====================================

function log(message) {

  const logs =
    document.getElementById("logs");

  logs.innerHTML +=
    "<br>✔ " + message;

  logs.scrollTop =
    logs.scrollHeight;
}

// =====================================
// PROGRESS BAR
// =====================================

function setProgress(value) {

  document
    .getElementById("progressBar")
    .style.width =
    value + "%";
}

// =====================================
// READ CSV
// =====================================

function readCSV(file) {

  return new Promise((resolve) => {

    const reader =
      new FileReader();

    reader.onload =
      (e) => {

        resolve(
          e.target.result
        );
      };

    reader.readAsText(file);

  });
}

// =====================================
// READ EXCEL
// =====================================

function readExcel(file) {

  return new Promise((resolve) => {

    const reader =
      new FileReader();

    reader.onload =
      function(e) {

        const data =
          new Uint8Array(
            e.target.result
          );

        const workbook =
          XLSX.read(data, {
            type: "array"
          });

        const firstSheet =
          workbook.Sheets[
            workbook.SheetNames[0]
          ];

        const csv =
          XLSX.utils.sheet_to_csv(firstSheet);

        resolve(csv);
      };

    reader.readAsArrayBuffer(file);

  });
}

// =====================================
// TRACKER HEADER LOADING
// =====================================

document
  .getElementById("tracker")
  .addEventListener(
    "change",
    async function(event) {

      try {

        log("Reading Tracker Headers");

        const file =
          event.target.files[0];

        let csvText = "";

        if (
          file.name
            .toLowerCase()
            .endsWith(".xlsx")
        ) {

          csvText =
            await readExcel(file);

        } else {

          csvText =
            await readCSV(file);
        }

        const firstLine =
          csvText
            .split("\n")[0]
            .replace(/\r/g, "");

        const headers =
          firstLine.split(",");

        const ecomDropdown =
          document.getElementById("ecomColumn");

        const launchDropdown =
          document.getElementById("launchColumn");

        ecomDropdown.innerHTML = "";

        launchDropdown.innerHTML = "";

        headers.forEach(function(header, index) {

          const option1 =
            document.createElement("option");

          option1.value =
            index;

          option1.text =
            header;

          ecomDropdown.appendChild(option1);

          const option2 =
            document.createElement("option");

          option2.value =
            index;

          option2.text =
            header;

          launchDropdown.appendChild(option2);

        });

        log("Tracker Headers Loaded");

      } catch(error) {

        console.error(error);

        alert(error.message);
      }
    }
  );

// =====================================
// RUN VALIDATION
// =====================================

async function runValidation() {

  try {

    const salesFile =
      document.getElementById("sales").files[0];

    const inventoryFile =
      document.getElementById("inventory").files[0];

    const trackerFile =
      document.getElementById("tracker").files[0];

    const contentFile =
      document.getElementById("content").files[0];

    if (
      !salesFile ||
      !inventoryFile ||
      !trackerFile ||
      !contentFile
    ) {

      alert(
        "Please upload all files"
      );

      return;
    }

    setProgress(10);

    log("Reading Sales CSV");

    const sales =
      await readCSV(salesFile);

    setProgress(20);

    log("Reading Inventory CSV");

    const inventory =
      await readCSV(inventoryFile);

    setProgress(30);

    log("Reading Tracker File");

    let tracker = "";

    if (
      trackerFile.name
        .toLowerCase()
        .endsWith(".xlsx")
    ) {

      tracker =
        await readExcel(trackerFile);

    } else {

      tracker =
        await readCSV(trackerFile);
    }

    setProgress(40);

    log("Reading Content CSV");

    const content =
      await readCSV(contentFile);

    setProgress(50);

    log("Preparing Validation");

    const region =
      document.getElementById("region").value;

    const ecomColumn =
      Number(
        document.getElementById("ecomColumn").value
      );

    const launchColumn =
      Number(
        document.getElementById("launchColumn").value
      );

    setProgress(60);

    log("Sending Data To API");

    const response =
      await fetch(API_URL, {

        method: "POST",

        body:
          JSON.stringify({

            sales,
            inventory,
            tracker,
            content,
            region,
            ecomColumn,
            launchColumn

          })
      });

    setProgress(80);

    log("Generating Output CSV");

    const csv =
      await response.text();

    const blob =
      new Blob(
        [csv],
        {
          type: "text/csv"
        }
      );

    const url =
      window.URL.createObjectURL(blob);

    const a =
      document.createElement("a");

    a.href = url;

    a.download =
      "validation_output.csv";

    document.body.appendChild(a);

    a.click();

    a.remove();

    setProgress(100);

    log("Validation Completed");

  } catch(error) {

    console.error(error);

    alert(
      "Validation Failed"
    );

    log(
      "Error: " +
      error.message
    );
  }
}

</script>

</body>
</html>
